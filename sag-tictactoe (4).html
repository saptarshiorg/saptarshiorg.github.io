<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050506">
<title>SN ENTERTAINMENT — Tic Tac Toe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#ff103f;
    --red-soft:#ff4d6d;
    --red-dim:#7a0a1e;
    --blue:#2fc7ff;
    --blue-dim:#0a5a7a;
    --bg:#050506;
    --panel:#0c0c0e;
    --line:#241014;
    --text:#f5eaea;
    --muted:#8a6a70;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}
  html,body{height:100%; overscroll-behavior:none;}
  body{
    margin:0;
    -webkit-user-select:none;
    user-select:none;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,16,63,0.10), transparent 60%),
      radial-gradient(ellipse 50% 30% at 100% 100%, rgba(255,16,63,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Rajdhani',sans-serif;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    padding-top:calc(24px + env(safe-area-inset-top));
    padding-bottom:calc(24px + env(safe-area-inset-bottom));
    overflow-x:hidden;
  }

  /* faint scanline / grid texture */
  body::before{
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,16,63,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,16,63,0.035) 1px, transparent 1px);
    background-size:38px 38px;
    pointer-events:none;
    z-index:0;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black, transparent 75%);
  }

  .stage{
    position:relative;
    z-index:1;
    width:100%;
    max-width:460px;
  }

  /* ---------- Header / brand block ---------- */
  .brand{
    text-align:center;
    margin-bottom:22px;
  }
  .brand .studio{
    font-family:'Audiowide', sans-serif;
    font-size:clamp(22px,6.5vw,32px);
    letter-spacing:3px;
    color:var(--red);
    text-shadow:
      0 0 6px rgba(255,16,63,0.9),
      0 0 18px rgba(255,16,63,0.55),
      0 0 42px rgba(255,16,63,0.35);
    animation:flicker 4.5s infinite ease-in-out;
  }
  .brand .presents{
    margin-top:4px;
    font-size:11px;
    letter-spacing:6px;
    color:var(--muted);
    text-transform:uppercase;
  }
  .brand .sub{
    margin-top:10px;
    font-family:'Audiowide', sans-serif;
    font-size:clamp(13px,3.6vw,16px);
    letter-spacing:5px;
    color:#fff;
    text-transform:uppercase;
  }

  @keyframes flicker{
    0%,19%,21%,23%,54%,56%,100%{opacity:1;}
    20%,22%,55%{opacity:0.72;}
  }

  /* ---------- Name entry ---------- */
  .panel{
    background:linear-gradient(180deg, rgba(20,10,12,0.9), rgba(8,7,8,0.92));
    border:1px solid var(--line);
    border-radius:18px;
    padding:22px;
    box-shadow:
      0 0 0 1px rgba(255,16,63,0.05) inset,
      0 20px 50px rgba(0,0,0,0.55),
      0 0 40px rgba(255,16,63,0.06);
    backdrop-filter:blur(10px);
  }

  .setup h2{
    margin:0 0 16px;
    font-family:'Audiowide',sans-serif;
    font-size:14px;
    letter-spacing:3px;
    color:var(--red-soft);
    text-align:center;
    text-transform:uppercase;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:12px;
    letter-spacing:2px;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .name-input-wrap{position:relative;}
  .name-input-wrap .mark{
    position:absolute;
    left:14px; top:50%; transform:translateY(-50%);
    font-family:'Audiowide',sans-serif;
    font-size:16px;
  }
  .mark.x{color:var(--red);}
  .mark.o{color:var(--blue); text-shadow:0 0 6px rgba(47,199,255,0.9), 0 0 14px rgba(47,199,255,0.5);}
  input[type="text"]{
    width:100%;
    padding:13px 14px 13px 40px;
    background:#0a0a0b;
    border:1px solid var(--line);
    border-radius:10px;
    color:#fff;
    font-family:'Rajdhani',sans-serif;
    font-size:16px;
    font-weight:600;
    letter-spacing:1px;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  input[type="text"]::placeholder{color:#5c4448;}
  input[type="text"]:focus{
    border-color:var(--red);
    box-shadow:0 0 0 3px rgba(255,16,63,0.15), 0 0 16px rgba(255,16,63,0.35);
  }

  .btn{
    display:block;
    width:100%;
    padding:14px;
    margin-top:6px;
    border:none;
    border-radius:10px;
    background:linear-gradient(180deg, var(--red), #c40b30);
    color:#fff;
    font-family:'Audiowide',sans-serif;
    font-size:13px;
    letter-spacing:3px;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow:0 0 0 1px rgba(255,255,255,0.06) inset, 0 8px 24px rgba(255,16,63,0.35);
    transition:transform .12s ease, box-shadow .2s ease, filter .2s ease;
  }
  .btn:hover{filter:brightness(1.08); box-shadow:0 0 0 1px rgba(255,255,255,0.08) inset, 0 10px 30px rgba(255,16,63,0.5);}
  .btn:active{transform:scale(0.98);}
  .btn.ghost{
    background:transparent;
    border:1px solid var(--line);
    box-shadow:none;
    color:var(--muted);
    margin-top:10px;
  }
  .btn.ghost:hover{border-color:var(--red-dim); color:var(--red-soft); filter:none;}

  /* ---------- Game view ---------- */
  .hidden{display:none !important;}

  .scoreboard{
    display:flex;
    align-items:stretch;
    gap:10px;
    margin-bottom:16px;
  }
  .score-card{
    flex:1;
    background:#0a0a0b;
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 8px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .score-card.active{
    border-color:var(--red);
    box-shadow:0 0 14px rgba(255,16,63,0.35), 0 0 0 1px rgba(255,16,63,0.25) inset;
  }
  .score-card .who{
    font-size:11px;
    letter-spacing:1.5px;
    color:var(--muted);
    text-transform:uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .score-card .mk{
    font-family:'Audiowide',sans-serif;
    font-size:12px;
    margin-top:2px;
  }
  .score-card.x .mk{color:var(--red);}
  .score-card.o .mk{color:var(--blue); text-shadow:0 0 8px rgba(47,199,255,0.7);}
  .score-card.o.active{
    border-color:var(--blue);
    box-shadow:0 0 14px rgba(47,199,255,0.4), 0 0 0 1px rgba(47,199,255,0.3) inset;
  }
  .score-card .val{
    font-family:'Audiowide',sans-serif;
    font-size:22px;
    color:#fff;
    margin-top:4px;
    text-shadow:0 0 10px rgba(255,16,63,0.4);
  }
  .score-card.draw{
    border-color:var(--blue-dim);
  }
  .score-card.draw .who{color:var(--blue); opacity:0.85;}
  .score-card.draw .val{
    color:var(--blue);
    text-shadow:0 0 8px rgba(47,199,255,0.6), 0 0 18px rgba(47,199,255,0.35);
  }

  .status{
    text-align:center;
    min-height:26px;
    margin-bottom:14px;
    font-family:'Audiowide',sans-serif;
    font-size:14px;
    letter-spacing:1.5px;
    color:#fff;
  }
  .status .flag{color:var(--red-soft);}
  .status .flag.o{color:var(--blue); text-shadow:0 0 8px rgba(47,199,255,0.55);}

  .board{
    position:relative;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    aspect-ratio:1;
    background:#0a0a0b;
    padding:8px;
    border-radius:14px;
    border:1px solid var(--line);
  }
  .cell{
    background:linear-gradient(180deg, #101012, #0a0a0b);
    border:1px solid var(--line);
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
    transition:border-color .15s, box-shadow .15s, background .15s;
  }
  .cell:hover:not(.filled){
    border-color:var(--red-dim);
    box-shadow:0 0 12px rgba(255,16,63,0.15) inset;
  }
  .cell svg{
    width:56%;
    height:56%;
    opacity:0;
    transform:scale(0.5);
    animation:mark-in .28s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  @keyframes mark-in{
    to{opacity:1; transform:scale(1);}
  }
  .cell .x-mark line{
    stroke:var(--red);
    stroke-width:9;
    stroke-linecap:round;
    filter:drop-shadow(0 0 6px rgba(255,16,63,0.9)) drop-shadow(0 0 16px rgba(255,16,63,0.5));
  }
  .cell .o-mark circle{
    fill:none;
    stroke:var(--blue);
    stroke-width:9;
    filter:drop-shadow(0 0 6px rgba(47,199,255,0.9)) drop-shadow(0 0 16px rgba(47,199,255,0.55));
  }
  .cell.win{
    border-color:var(--red);
    background:linear-gradient(180deg, rgba(255,16,63,0.14), rgba(255,16,63,0.04));
    box-shadow:0 0 22px rgba(255,16,63,0.4) inset, 0 0 18px rgba(255,16,63,0.3);
  }
  .cell.win.win-o{
    border-color:var(--blue);
    background:linear-gradient(180deg, rgba(47,199,255,0.14), rgba(47,199,255,0.04));
    box-shadow:0 0 22px rgba(47,199,255,0.4) inset, 0 0 18px rgba(47,199,255,0.3);
  }

  .controls{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  .controls .btn{margin-top:0;}

  .footer-tag{
    text-align:center;
    margin-top:20px;
    font-size:10px;
    letter-spacing:3px;
    color:#4a3438;
    text-transform:uppercase;
  }
  .footer-tag b{color:var(--red-dim);}

  /* ---------- Paid stamp badge ---------- */
  .paid-stamp{
    position:fixed;
    top:16px;
    right:16px;
    z-index:5;
    width:74px;
    height:74px;
    border-radius:50%;
    border:2px solid var(--red);
    display:flex;
    align-items:center;
    justify-content:center;
    transform:rotate(-14deg);
    background:radial-gradient(circle at 50% 40%, rgba(255,16,63,0.14), rgba(5,5,6,0.6));
    box-shadow:
      0 0 8px rgba(255,16,63,0.75),
      0 0 20px rgba(255,16,63,0.4),
      inset 0 0 10px rgba(255,16,63,0.35);
    pointer-events:none;
    animation:stamp-pulse 3.2s ease-in-out infinite;
  }
  .paid-stamp::before{
    content:'';
    position:absolute;
    inset:6px;
    border:1px dashed rgba(255,16,63,0.55);
    border-radius:50%;
  }
  .paid-stamp .stamp-text{
    text-align:center;
    font-family:'Audiowide',sans-serif;
    color:var(--red);
    text-shadow:0 0 6px rgba(255,16,63,0.9), 0 0 14px rgba(255,16,63,0.5);
  }
  .paid-stamp .stamp-word{
    display:block;
    font-size:11px;
    letter-spacing:1.5px;
  }
  .paid-stamp .stamp-amount{
    display:block;
    font-size:14px;
    margin-top:2px;
  }
  @keyframes stamp-pulse{
    0%,100%{ box-shadow:0 0 8px rgba(255,16,63,0.75), 0 0 20px rgba(255,16,63,0.4), inset 0 0 10px rgba(255,16,63,0.35); }
    50%{ box-shadow:0 0 12px rgba(255,16,63,0.95), 0 0 30px rgba(255,16,63,0.6), inset 0 0 14px rgba(255,16,63,0.5); }
  }

  @media (max-width:380px){
    .paid-stamp{ width:58px; height:58px; top:10px; right:10px; }
    .paid-stamp .stamp-word{ font-size:9px; }
    .paid-stamp .stamp-amount{ font-size:11px; }
  }

  @media (max-width:380px){
    body{padding:14px; padding-top:calc(14px + env(safe-area-inset-top)); padding-bottom:calc(14px + env(safe-area-inset-bottom));}
    .panel{padding:14px; border-radius:14px;}
    .brand{margin-bottom:16px;}
    .board{gap:6px; padding:6px;}
    .cell{border-radius:8px;}
    .controls{gap:8px;}
    .btn{padding:12px; font-size:12px; letter-spacing:2px;}
    .score-card{padding:8px 6px;}
    .score-card .val{font-size:18px;}
  }

  @media (max-width:340px){
    .brand .studio{letter-spacing:1.5px;}
    .brand .sub{letter-spacing:3px;}
  }
</style>
</head>
<body>

<div class="paid-stamp" aria-hidden="true">
  <span class="stamp-text">
    <span class="stamp-word">PAID</span>
    <span class="stamp-amount">₹500</span>
  </span>
</div>

<div class="stage">

  <div class="brand">
    <div class="presents">Presents</div>
    <div class="studio">SN <span>ENTERTAINMENT</span></div>
    <div class="sub">Tic Tac Toe</div>
  </div>

  <div class="panel">

    <!-- SETUP SCREEN -->
    <div class="setup" id="setupScreen">
      <h2>Enter The Arena</h2>

      <div class="field">
        <label for="p1">Player One</label>
        <div class="name-input-wrap">
          <span class="mark x">✕</span>
          <input type="text" id="p1" placeholder="Player One" maxlength="14" autocomplete="off">
        </div>
      </div>

      <div class="field">
        <label for="p2">Player Two</label>
        <div class="name-input-wrap">
          <span class="mark o">○</span>
          <input type="text" id="p2" placeholder="Player Two" maxlength="14" autocomplete="off">
        </div>
      </div>

      <button class="btn" id="startBtn">Start Match</button>
    </div>

    <!-- GAME SCREEN -->
    <div class="hidden" id="gameScreen">

      <div class="scoreboard">
        <div class="score-card x" id="cardX">
          <div class="who" id="nameX">Player One</div>
          <div class="mk">✕</div>
          <div class="val" id="scoreX">0</div>
        </div>
        <div class="score-card draw" id="cardDraw">
          <div class="who">Draws</div>
          <div class="mk">—</div>
          <div class="val" id="scoreDraw">0</div>
        </div>
        <div class="score-card o" id="cardO">
          <div class="who" id="nameO">Player Two</div>
          <div class="mk">○</div>
          <div class="val" id="scoreO">0</div>
        </div>
      </div>

      <div class="status" id="statusText"></div>

      <div class="board" id="board"></div>

      <div class="controls">
        <button class="btn ghost" id="resetScoreBtn">Reset Score</button>
        <button class="btn" id="newRoundBtn">Next Round</button>
      </div>

      <button class="btn ghost" id="changePlayersBtn" style="margin-top:8px;">Change Players</button>
    </div>

  </div>

  <div class="footer-tag">SN Entertainment <b>×</b> Tic Tac Toe</div>

</div>

<script>
(function(){
  const setupScreen = document.getElementById('setupScreen');
  const gameScreen = document.getElementById('gameScreen');
  const p1Input = document.getElementById('p1');
  const p2Input = document.getElementById('p2');
  const startBtn = document.getElementById('startBtn');
  const changePlayersBtn = document.getElementById('changePlayersBtn');
  const boardEl = document.getElementById('board');
  const statusText = document.getElementById('statusText');
  const nameXEl = document.getElementById('nameX');
  const nameOEl = document.getElementById('nameO');
  const scoreXEl = document.getElementById('scoreX');
  const scoreOEl = document.getElementById('scoreO');
  const scoreDrawEl = document.getElementById('scoreDraw');
  const cardX = document.getElementById('cardX');
  const cardO = document.getElementById('cardO');
  const resetScoreBtn = document.getElementById('resetScoreBtn');
  const newRoundBtn = document.getElementById('newRoundBtn');

  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let names = { X: 'Player One', O: 'Player Two' };
  let scores = { X: 0, O: 0, D: 0 };
  let board = Array(9).fill(null);
  let current = 'X';
  let active = true;

  function xIcon(){
    return `<svg class="x-mark" viewBox="0 0 100 100"><line x1="20" y1="20" x2="80" y2="80"/><line x1="80" y1="20" x2="20" y2="80"/></svg>`;
  }
  function oIcon(){
    return `<svg class="o-mark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>`;
  }

  function buildBoard(){
    boardEl.innerHTML = '';
    for(let i=0;i<9;i++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = i;
      cell.addEventListener('click', onCellClick);
      boardEl.appendChild(cell);
    }
  }

  function onCellClick(e){
    const i = Number(e.currentTarget.dataset.index);
    if(!active || board[i]) return;
    placeMark(i, current);
    const result = checkWin();
    if(result){
      endRound(result);
    } else if(board.every(c => c)){
      endRound({ draw:true });
    } else {
      current = current === 'X' ? 'O' : 'X';
      updateStatus();
    }
  }

  function placeMark(i, mark){
    board[i] = mark;
    const cell = boardEl.children[i];
    cell.classList.add('filled');
    cell.innerHTML = mark === 'X' ? xIcon() : oIcon();
  }

  function checkWin(){
    for(const line of WIN_LINES){
      const [a,b,c] = line;
      if(board[a] && board[a] === board[b] && board[a] === board[c]){
        return { winner: board[a], line };
      }
    }
    return null;
  }

  function endRound(result){
    active = false;
    if(result.draw){
      scores.D++;
      scoreDrawEl.textContent = scores.D;
      statusText.innerHTML = `Round drawn — <span class="flag">no winner</span>`;
    } else {
      const { winner, line } = result;
      line.forEach(i => {
        boardEl.children[i].classList.add('win');
        if(winner === 'O') boardEl.children[i].classList.add('win-o');
      });
      scores[winner]++;
      (winner === 'X' ? scoreXEl : scoreOEl).textContent = scores[winner];
      const winnerName = winner === 'X' ? names.X : names.O;
      const flagClass = winner === 'O' ? 'flag o' : 'flag';
      statusText.innerHTML = `<span class="${flagClass}">${escapeHtml(winnerName)}</span> takes the round`;
    }
    highlightTurn(null);
  }

  function updateStatus(){
    const playerName = current === 'X' ? names.X : names.O;
    const flagClass = current === 'O' ? 'flag o' : 'flag';
    statusText.innerHTML = `<span class="${flagClass}">${escapeHtml(playerName)}</span>'s move`;
    highlightTurn(current);
  }

  function highlightTurn(mark){
    cardX.classList.toggle('active', mark === 'X');
    cardO.classList.toggle('active', mark === 'O');
  }

  function newRound(){
    board = Array(9).fill(null);
    active = true;
    current = 'X';
    buildBoard();
    updateStatus();
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  startBtn.addEventListener('click', () => {
    names.X = p1Input.value.trim() || 'Player One';
    names.O = p2Input.value.trim() || 'Player Two';
    nameXEl.textContent = names.X;
    nameOEl.textContent = names.O;
    scores = { X:0, O:0, D:0 };
    scoreXEl.textContent = 0;
    scoreOEl.textContent = 0;
    scoreDrawEl.textContent = 0;
    setupScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');
    newRound();
  });

  [p1Input, p2Input].forEach(inp => {
    inp.addEventListener('keydown', e => {
      if(e.key === 'Enter') startBtn.click();
    });
  });

  newRoundBtn.addEventListener('click', newRound);

  resetScoreBtn.addEventListener('click', () => {
    scores = { X:0, O:0, D:0 };
    scoreXEl.textContent = 0;
    scoreOEl.textContent = 0;
    scoreDrawEl.textContent = 0;
    newRound();
  });

  changePlayersBtn.addEventListener('click', () => {
    gameScreen.classList.add('hidden');
    setupScreen.classList.remove('hidden');
  });

  buildBoard();
})();
</script>

</body>
</html>
