<style>
:root{

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

/* ── LOADING FULL SCREEN ── */
#cms-loader{
  position:fixed;inset:0;z-index:9999;
  background:#080510;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.5s;
  overflow:hidden;
}
#cms-loader.done{opacity:0;pointer-events:none;}

/* big radial gold glow */
#cms-loader::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 50% 50%,
    rgba(168,85,247,0.22) 0%,
    rgba(109,40,217,0.12) 40%,
    rgba(139,92,246,0.05) 70%,
    transparent 100%);
  animation:glowPulse 1.6s ease-in-out infinite;
}
/* shimmer sweep */
#cms-loader::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg,
    transparent 30%,
    rgba(168,85,247,0.07) 48%,
    rgba(192,132,252,0.18) 50%,
    rgba(168,85,247,0.07) 52%,
    transparent 70%);
  animation:shimmerSweep 2s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{opacity:0.7;transform:scale(1);}
  50%{opacity:1;transform:scale(1.08);}
}
@keyframes shimmerSweep{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

.loader-popup{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:32px;
  animation:popupIn 0.5s cubic-bezier(.34,1.4,.64,1) both;
}
@keyframes popupIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}

.loader-popup-img{
  width:200px;height:auto;display:block;
  filter:drop-shadow(0 0 32px rgba(168,85,247,0.8)) drop-shadow(0 0 80px rgba(124,58,237,0.5));
  animation:logoPulse 1.6s ease-in-out infinite;
}
@keyframes logoPulse{
  0%,100%{filter:drop-shadow(0 0 28px rgba(168,85,247,0.75)) drop-shadow(0 0 60px rgba(124,58,237,0.45));}
  50%{filter:drop-shadow(0 0 50px rgba(192,132,252,1.0)) drop-shadow(0 0 100px rgba(168,85,247,0.7));}
}

/* gold bar */
.loader-goldbar{
  width:180px;height:3px;border-radius:2px;overflow:hidden;
  background:rgba(168,85,247,0.12);
  box-shadow:0 0 12px rgba(168,85,247,0.3);
}
.loader-goldbar-inner{
  height:100%;width:30%;border-radius:2px;
  background:linear-gradient(90deg,transparent,#A855F7,#E9D5FF,#A855F7,transparent);
  animation:barSlide 1.4s ease-in-out infinite;
}
@keyframes barSlide{
  0%{transform:translateX(-200%);}
  100%{transform:translateX(500%);}
}

.loader-enjoy{

  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:goldText 2s linear infinite;
  text-shadow:none;
  margin-top:4px;
}
@keyframes goldText{0%{background-position:0%}100%{background-position:200%}}

/* ── FIXTURES ── */
.fixtures-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.fixture-card{background:linear-gradient(145deg,#110C22,#0C0919);border:1px solid rgba(139,33,232,.12);border-radius:14px;overflow:hidden;transition:all .25s;position:relative;}
.fixture-card:hover{transform:translateY(-4px);border-color:rgba(168,85,247,.35);box-shadow:0 8px 32px rgba(168,85,247,.08);}
.fixture-top{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05);}
.fixture-date{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--cyan);}
.fixture-venue-sm{font-size:11px;color:rgba(255,255,255,.88);margin-top:2px;}
.fixture-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.28);border-radius:100px;padding:2px 9px;font-family:var(--font-display);font-size:10px;font-weight:800;color:var(--cyan);letter-spacing:1px;text-transform:uppercase;}
.fixture-badge-live{background:rgba(232,0,61,.15);border-color:rgba(232,0,61,.5);color:var(--red-live);}
.fixture-body{padding:16px;}
.fixture-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.fixture-team{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;}
.team-logo-wrap{width:64px;height:64px;display:flex;align-items:center;justify-content:center;}
.team-logo-wrap img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 8px rgba(168,85,247,.12));}
.fixture-team-name{font-family:var(--font-display);font-weight:700;font-size:12px;color:rgba(255,255,255,.88);text-align:center;line-height:1.3;}
.fixture-vs{font-family:var(--font-display);font-weight:900;font-size:20px;color:var(--red-live);flex-shrink:0;}
.fixture-footer{padding:10px 16px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.04);}
.fixture-venue-label{font-size:10px;color:rgba(255,255,255,.5);}
.btn-watch-sm{display:inline-flex;align-items:center;gap:5px;background:var(--yellow);color:var(--black);padding:7px 16px;border-radius:4px;font-family:var(--font-display);font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:all .15s;}
.btn-watch-sm:hover{background:var(--yellow-dark);}
.live-shimmer{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red-live),rgba(255,80,0,.4),var(--red-live));animation:shimmer 1.5s linear infinite;}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}

/* ── CATEGORIES ── */
.categories-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.cat-card{border-radius:10px;height:140px;display:flex;flex-direction:column;justify-content:flex-end;padding:18px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;text-decoration:none;}
.cat-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4);}
.cat-card .cat-emoji{position:absolute;top:14px;right:14px;font-size:48px;opacity:.2;transition:opacity .2s,transform .2s;}
.cat-card:hover .cat-emoji{opacity:.38;transform:scale(1.1) rotate(-5deg);}
.cat-name{font-family:var(--font-display);font-weight:900;font-size:24px;text-transform:uppercase;color:var(--white);letter-spacing:1px;position:relative;z-index:1;}
.cat-count{font-size:11px;color:rgba(255,255,255,.88);margin-top:2px;position:relative;z-index:1;}
.cat-cricket{background:linear-gradient(135deg,#005fa3,#002a5e);}
.cat-football{background:linear-gradient(135deg,#006400,#003300);}
.cat-tennis{background:linear-gradient(135deg,#CC5500,#7a2a00);}
.cat-f1{background:linear-gradient(135deg,#1a0000,#4a0000);}

/* ── BROADCAST ── */
.broadcast-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.broadcast-card{border-radius:14px;padding:28px 22px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;position:relative;overflow:hidden;transition:all .3s;border:1px solid rgba(139,33,232,.12);background:linear-gradient(145deg,#110C22,#0C0919);}
.broadcast-card:hover{transform:translateY(-4px);border-color:rgba(168,85,247,.3);box-shadow:0 12px 40px rgba(168,85,247,.08);}
.bc-featured{background:linear-gradient(135deg,#170D38 0%,#0F0730 50%,#0A0820 100%);border-color:rgba(139,33,232,.55)!important;}
.bc-featured::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),rgba(168,85,247,.3),var(--bhagva));border-radius:14px 14px 0 0;}
.broadcast-logo-wrap{width:80px;height:80px;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.broadcast-logo-wrap img{width:80px;height:80px;object-fit:contain;}
.broadcast-name{font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:.06em;color:var(--white);}
.broadcast-quality{display:inline-block;padding:3px 14px;border-radius:100px;font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:rgba(168,85,247,.1);color:var(--cyan);border:1px solid rgba(168,85,247,.3);}
.broadcast-desc{font-size:13px;color:rgba(255,255,255,.7);line-height:1.6;}
.partner-logos-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;width:100%;margin-bottom:8px;}
.partner-logo-item{display:flex;flex-direction:column;align-items:center;gap:5px;}
.partner-logo-box{width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.partner-logo-box img{width:52px;height:52px;object-fit:contain;}
.partner-logo-label{font-size:9px;color:rgba(255,255,255,.7);letter-spacing:.06em;text-align:center;text-transform:uppercase;}
.bc-watch-btn{display:inline-flex;align-items:center;gap:6px;background:var(--logo-grad);color:var(--white);font-family:var(--font-display);font-weight:800;font-size:14px;padding:10px 24px;border-radius:6px;text-decoration:none;transition:all .15s;box-shadow:0 2px 14px rgba(91,33,182,.4);}
.bc-watch-btn:hover{background:var(--logo-grad-rev);box-shadow:0 4px 22px rgba(91,33,182,.6);}

/* ── SCHEDULE ── */
.schedule-section{background:linear-gradient(180deg,#0C0919,#0F0B20);border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05);}
.schedule-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid rgba(255,255,255,.08);}
.tab{font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:.5px;padding:10px 22px;cursor:pointer;color:var(--gray-400);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none;}
.tab.active,.tab:hover{color:var(--white);}
.tab.active{border-bottom-color:#8B21E8;}
.match-row{display:grid;grid-template-columns:100px 1fr auto 1fr 140px;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.match-time{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--white);line-height:1.4;}
.match-sport-badge{font-family:var(--font-display);font-weight:800;font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:2px;text-transform:uppercase;display:inline-block;margin-top:3px;background:#dbeafe;color:#1d4ed8;}
.team-home,.team-away{text-align:center;}
.team-name{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--white);}
.team-logo-s{width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 3px;filter:drop-shadow(0 0 4px rgba(168,85,247,.1));}
.vs-box{font-family:var(--font-display);font-weight:900;font-size:18px;color:var(--red-live);text-align:center;}
.match-channel{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--gray-400);text-align:right;}
.match-live-tag{display:inline-block;background:var(--red-live);color:var(--white);font-family:var(--font-display);font-weight:800;font-size:10px;letter-spacing:1.5px;padding:3px 7px;border-radius:2px;margin-bottom:4px;}

/* ── CTA ── */
.cta-box{background:linear-gradient(135deg,#130B2B 0%,#0C0820 50%,#160D35 100%);border:1px solid rgba(139,33,232,.35);border-radius:18px;padding:56px 40px;text-align:center;position:relative;overflow:hidden;}
.cta-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 80% at 50% 50%,rgba(139,33,232,.08) 0%,rgba(45,39,160,.04) 60%,transparent 80%);pointer-events:none;}
.cta-title{font-family:var(--font-display);font-weight:900;font-size:48px;background:var(--logo-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;position:relative;}
.cta-sub{font-size:15px;color:rgba(255,255,255,.82);max-width:540px;margin:0 auto 28px;line-height:1.6;position:relative;}
.cta-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;position:relative;}
.cta-btn-primary{background:var(--yellow);color:var(--black);font-family:var(--font-display);font-weight:800;font-size:18px;padding:14px 36px;border-radius:6px;text-decoration:none;letter-spacing:.5px;transition:background .15s,transform .1s;}
.cta-btn-primary:hover{background:var(--yellow-dark);transform:translateY(-1px);}
.cta-btn-outline{background:transparent;color:var(--white);font-family:var(--font-display);font-weight:700;font-size:16px;padding:14px 28px;border-radius:6px;text-decoration:none;border:2px solid rgba(255,255,255,.25);transition:border-color .15s;}
.cta-btn-outline:hover{border-color:var(--yellow);color:var(--yellow);}

/* ── SOCIAL BAR ── */
.social-bar{background:linear-gradient(90deg,#0F0A22,#0D071E,#0F0A22);padding:20px 0;border-top:1px solid rgba(139,33,232,.2);}
.social-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.social-text{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--white);}
.social-links{display:flex;gap:12px;flex-wrap:wrap;}
.social-link{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);color:var(--white);font-family:var(--font-display);font-weight:700;font-size:13px;padding:8px 14px;border-radius:4px;text-decoration:none;border:1px solid rgba(255,255,255,.12);transition:all .15s;}
.social-link:hover{background:var(--cyan);color:var(--white);border-color:var(--cyan);}

/* ── FOOTER ── */
footer{background:linear-gradient(180deg,#0F0A22 0%,#07040E 100%);padding:48px 0 24px;border-top:3px solid transparent;border-image:var(--logo-grad-h) 1;}
.footer-inner{max-width:1400px;margin:0 auto;padding:0 24px;}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:32px;padding-bottom:36px;border-bottom:1px solid rgba(255,255,255,.07);}
.footer-brand img{height:44px;margin-bottom:14px;object-fit:contain;}
.footer-brand p{font-size:13px;color:rgba(255,255,255,.88);line-height:1.6;max-width:240px;}
.footer-col h4{font-family:var(--font-display);font-weight:800;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan);margin-bottom:14px;}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.footer-col ul a{font-size:13px;color:rgba(255,255,255,.90);text-decoration:none;transition:color .15s;}
.footer-col ul a:hover{color:var(--white);}
.footer-bottom{padding-top:22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.footer-copy{font-size:12px;color:rgba(255,255,255,.5);}
.footer-legal{display:flex;gap:20px;}
.footer-legal a{font-size:12px;color:rgba(255,255,255,.5);text-decoration:none;transition:color .15s;}
.footer-legal a:hover{color:rgba(255,255,255,.88);}

/* ── WATCH POPUP ── */
.watch-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:16px;}
.watch-overlay.open{display:flex;animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.watch-modal{background:linear-gradient(160deg,#130B2B,#0A0618,#110D28);border:1px solid rgba(139,33,232,.4);border-radius:18px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 0 60px rgba(168,85,247,.12),0 24px 80px rgba(0,0,0,.85);animation:modalUp .28s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes modalUp{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:none}}
.watch-modal-header{padding:20px 24px 16px;border-bottom:1px solid rgba(139,33,232,.15);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,rgba(139,33,232,.1),transparent);border-radius:18px 18px 0 0;position:sticky;top:0;z-index:2;backdrop-filter:blur(12px);}
.watch-modal-title{font-family:var(--font-display);font-size:22px;font-weight:900;letter-spacing:.08em;color:var(--cyan);display:flex;align-items:center;gap:10px;}
.watch-modal-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.80);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.watch-modal-close:hover{background:rgba(255,50,50,.2);border-color:rgba(255,80,80,.4);color:#fff;}
.watch-modal-body{padding:20px 24px 24px;}
.watch-lang-section{margin-bottom:20px;}
.watch-lang-label{font-family:var(--font-body);font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:rgba(168,85,247,.5);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.watch-lang-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(168,85,247,.18),transparent);}
.watch-channels{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.watch-channel-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid rgba(168,85,247,.1);background:rgba(255,255,255,.03);text-decoration:none;color:var(--white);transition:all .2s;cursor:pointer;}
.watch-channel-btn:hover{border-color:rgba(168,85,247,.45);background:rgba(168,85,247,.06);transform:translateY(-2px);}
.watch-sx-featured{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:12px;border:1px solid rgba(168,85,247,.55);background:linear-gradient(135deg,rgba(168,85,247,.12),rgba(168,85,247,.04));text-decoration:none;color:var(--white);transition:all .2s;margin-bottom:16px;position:relative;overflow:hidden;}
.watch-sx-featured::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--bhagva),#C084FC);}
.watch-sx-featured:hover{border-color:rgba(168,85,247,.75);box-shadow:0 0 24px rgba(168,85,247,.2);}
.watch-ch-logo{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:transparent!important;}
.watch-ch-logo img{width:36px;height:36px;object-fit:contain;}
.watch-ch-info{display:flex;flex-direction:column;gap:2px;min-width:0;}
.watch-ch-name{font-weight:700;font-size:13px;letter-spacing:.03em;}
.watch-ch-lang{font-size:10px;color:rgba(168,85,247,.45);letter-spacing:.1em;text-transform:uppercase;}
.watch-ch-arrow{margin-left:auto;color:rgba(168,85,247,.4);font-size:12px;flex-shrink:0;}
.watch-modal-footer{padding:14px 24px;border-top:1px solid rgba(255,255,255,.06);text-align:center;font-size:11px;color:rgba(255,255,255,.22);letter-spacing:.06em;}
.badge-free{background:rgba(0,220,80,.12);border:1px solid rgba(0,220,80,.35);border-radius:3px;padding:1px 6px;font-size:9px;letter-spacing:.1em;color:#00dc50;font-weight:700;}
.badge-nologin{background:rgba(255,214,0,.08);border:1px solid rgba(255,214,0,.25);border-radius:3px;padding:1px 6px;font-size:9px;letter-spacing:.08em;color:rgba(255,214,0,.7);font-weight:700;}
.badge-4k{background:rgba(255,214,0,.15);border:1px solid rgba(255,214,0,.4);border-radius:3px;padding:1px 6px;font-size:9px;letter-spacing:.08em;color:var(--yellow);font-weight:700;}
.badge-unavail{background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.3);border-radius:3px;padding:1px 6px;font-size:9px;letter-spacing:.08em;color:#ff6060;font-weight:700;}
.unavail-card{opacity:.52;pointer-events:none;}

/* ── NAV QR BUTTON ── */
.nav-qr-wrap{position:relative;display:flex;align-items:center;}
.nav-qr-btn{width:40px;height:40px;background:rgba(255,255,255,.06);border:1px solid rgba(168,85,247,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;transition:all .2s;flex-shrink:0;}
.nav-qr-btn:hover,.nav-qr-btn.active{background:rgba(168,85,247,.12);border-color:rgba(168,85,247,.45);}
.qr-float-panel{position:absolute;top:calc(100% + 14px);right:0;z-index:500;background:linear-gradient(135deg,#1A0945,#0F0730);border:1px solid rgba(168,85,247,.3);border-radius:16px;padding:18px;box-shadow:0 0 40px rgba(168,85,247,.18),0 12px 40px rgba(0,0,0,.7);text-align:center;transform:scale(.85) translateY(-8px);opacity:0;pointer-events:none;transform-origin:top right;transition:all .25s cubic-bezier(.34,1.4,.64,1);width:200px;}
.qr-float-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}
.qr-float-title{font-family:var(--font-display);font-size:15px;font-weight:800;letter-spacing:.1em;color:var(--cyan);margin-bottom:4px;}
.qr-float-sub{font-size:10px;color:rgba(255,255,255,.88);letter-spacing:.06em;margin-bottom:12px;}
.qr-float-panel img{width:160px;height:160px;background:#fff;padding:8px;border-radius:10px;display:block;}
.qr-open-btn{display:block;margin-top:12px;background:var(--logo-grad);color:var(--white);padding:8px 0;border-radius:7px;width:100%;font-family:var(--font-display);font-weight:800;font-size:13px;text-decoration:none;transition:all .15s;}
.qr-open-btn:hover{background:var(--logo-grad-rev);}

/* ── RESPONSIVE ── */

/* Tablet / small laptop */
@media(max-width:900px){
  .nav-links-desktop{display:none;}
  .hamburger{display:flex;}
  .header-actions .btn-yt{display:none;}
  .header-inner{padding:0 16px;height:60px;}
  .logo-img{height:52px;}

  .slide-content{padding:0 18px 28px;max-width:100%;}
  .slide-title{font-size:34px;letter-spacing:0;}
  .slide-sub{font-size:13px;}

  .slider-match-overlay{position:relative;bottom:auto;left:auto;right:auto;
    display:flex;flex-direction:column;gap:10px;padding:12px 14px;
    max-width:100%;width:100%;background:var(--bg2);
    border-top:2px solid rgba(168,85,247,.2);}
  .smo-card{min-width:0;flex-shrink:unset;width:100%;padding:14px 14px 12px;box-sizing:border-box;}
  .smo-name{font-size:17px;}
  .smo-logo{width:38px;height:38px;}

  .section-inner{padding:0 16px;}
  .section{padding:28px 0;}
  .channels-grid{grid-template-columns:repeat(3,1fr);}
  .fixtures-grid{grid-template-columns:1fr 1fr;}
  .categories-grid{grid-template-columns:repeat(2,1fr);}
  .broadcast-grid{grid-template-columns:1fr;}

  .match-row{grid-template-columns:80px 1fr auto 1fr 110px;gap:8px;font-size:12px;}
  .schedule-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tab{padding:10px 14px;font-size:13px;white-space:nowrap;}

  .footer-top{grid-template-columns:1fr 1fr;}
  .footer-brand{grid-column:span 2;}
  .nav-qr-wrap{display:flex;}
  .cta-box{padding:32px 18px;}
  .cta-title{font-size:clamp(22px,5vw,36px);}

  .watch-modal{max-width:98vw;border-radius:14px;}
  .watch-channels{grid-template-columns:1fr 1fr;}
}

/* Mobile */
@media(max-width:560px){
  .header-inner{padding:0 12px;height:56px;}
  .logo-img{height:44px;}
  .logo-fallback{font-size:22px;}

  .slide-content{padding:0 14px 20px;}
  .slide-title{font-size:clamp(22px,7vw,28px);}
  .slide-sub{font-size:12px;}
  .btn-slide-watch,.btn-slide-outline{font-size:13px;padding:9px 16px;}
  .slide-btns{gap:8px;}

  .slider-match-overlay{padding:10px 12px;gap:8px;}
  .smo-card{padding:12px 12px 10px;}
  .smo-name{font-size:15px;}
  .smo-logo{width:34px;height:34px;}
  .smo-btn{font-size:12px;padding:8px;}
  .timer-display{font-size:15px;}

  .section-inner{padding:0 12px;}
  .section{padding:22px 0;}
  .section-title{font-size:20px;}

  .channels-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .channel-card{padding:14px 10px;}
  .channel-name{font-size:12px;}

  .fixtures-grid{grid-template-columns:1fr;gap:12px;}
  .team-logo-wrap{width:52px;height:52px;}

  .categories-grid{grid-template-columns:repeat(2,1fr);gap:10px;}

<!-- ════════════════════════════════════════════════
     CMS ENGINE — reads Google Sheets CSV
════════════════════════════════════════════════ -->
<script>
'use strict';

// ── CSV helper ──────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let cur = '', inQ = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], nx = text[i+1];
    if (inQ) {
      if (ch === '"' && nx === '"') { cur += '"'; i++; }
      else if (ch === '"') inQ = false;
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(cur.trim()); cur = ''; }
      else if (ch === '\r' && nx === '\n') { row.push(cur.trim()); rows.push(row); row = []; cur = ''; i++; }
      else if (ch === '\n' || ch === '\r') { row.push(cur.trim()); rows.push(row); row = []; cur = ''; }
      else cur += ch;
    }
  }
  if (cur || row.length) { row.push(cur.trim()); rows.push(row); }
  return rows.filter(r => r.some(c => c));
}

function toObj(rows) {
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.toLowerCase().replace(/[^a-z0-9_]/g,'_').replace(/__+/g,'_').replace(/^_|_$/g,''));
  return rows.slice(1).map(r => {
    const o = {};
    headers.forEach((h, i) => o[h] = (r[i] || '').trim());
    return o;
  });
}

async function fetchSheet(name) {
  if (!SHEET_ID || SHEET_ID === 'YOUR_SPREADSHEET_ID_HERE') {
    console.warn('⚠️  SHEET_ID not set — using placeholder data');
    return null;
  }
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    const text = await r.text();
    const rows = parseCSV(text);
    return toObj(rows);
  } catch(e) {
    console.warn(`Sheet "${name}" failed:`, e);
    return null;
  }
}

function active(rows) {
  if (!rows) return [];
  return rows.filter(r => {
    const a = (r.active || r.active_true_false || '').toUpperCase();
    return a !== 'FALSE';
  });
}

function setProgress(pct, text) { /* popup only — no bar */ }

// ── Slide auto-play ──────────────────────────────────────────
let slideInterval, currentSlide = 0, totalSlides = 0;
function goSlide(n) {
  const slides = document.querySelectorAll('.slide');
  const dots   = document.querySelectorAll('.dot');
  if (!slides.length) return;
  slides.forEach(s => s.classList.remove('active'));
  dots.forEach(d => d.classList.remove('active'));
  currentSlide = (n + slides.length) % slides.length;
  slides[currentSlide].classList.add('active');
  if (dots[currentSlide]) dots[currentSlide].classList.add('active');
}
function startSlider() {
  clearInterval(slideInterval);
  slideInterval = setInterval(() => goSlide(currentSlide + 1), 5000);
}

// ── Countdown timers ─────────────────────────────────────────
function startCountdown(el, target) {
  function update() {
    const diff = new Date(target) - Date.now();
    if (diff <= 0) { el.textContent = 'STARTING SOON'; return; }
    const h = Math.floor(diff/3600000),
          m = Math.floor((diff%3600000)/60000),
          s = Math.floor((diff%60000)/1000);
    el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  update();
  setInterval(update, 1000);
}

// ── Image with fallback ──────────────────────────────────────
function img(src, alt, cls='', fb='') {
  if (!src) return fb ? `<span style="font-size:32px">${fb}</span>` : '';
  return `<img src="${src}" alt="${alt}" class="${cls}" onerror="this.style.display='none'">`;
}

// ── RENDER FUNCTIONS ─────────────────────────────────────────

function renderSettings(rows) {
  if (!rows) return;
  const s = {};
  rows.forEach(r => { if (r.setting_key) s[r.setting_key] = r.value; });
  window._settings = s;

  if (s.site_title)      { document.title = s.site_title; document.getElementById('page-title').textContent = s.site_title; }
  if (s.site_favicon_url){ document.getElementById('favicon').href = s.site_favicon_url; }
  if (s.ticker_label)    { document.getElementById('ticker-label').textContent = s.ticker_label; }
  if (s.youtube_url)     { const b = document.getElementById('yt-btn'); b.href = s.youtube_url; b.textContent = `▶ ${s.youtube_label||'YouTube'}`; }
  if (s.cta_title)       { document.getElementById('cta-title').textContent = s.cta_title; }
  if (s.cta_subtitle)    { document.getElementById('cta-sub').textContent = s.cta_subtitle; }
  if (s.cta_btn1_text)   { const b = document.getElementById('cta-btn1'); b.textContent = s.cta_btn1_text; b.href = s.cta_btn1_url||'#'; }
  if (s.cta_btn2_text)   { const b = document.getElementById('cta-btn2'); b.textContent = s.cta_btn2_text; b.href = s.cta_btn2_url||'#'; }
  if (s.social_bar_text) { document.getElementById('social-text').textContent = s.social_bar_text; }
  if (s.footer_tagline)  { document.getElementById('footer-tagline').textContent = s.footer_tagline; }
  if (s.footer_copy)     { document.getElementById('footer-copy').textContent = s.footer_copy; }
  if (s.footer_logo_url) { document.getElementById('footer-logo').src = s.footer_logo_url; }
  if (s.qr_title)        { document.getElementById('qr-title').textContent = s.qr_title; }
  if (s.qr_sub)          { document.getElementById('qr-sub').textContent = s.qr_sub; }
  if (s.qr_image_url)    { document.getElementById('qr-img').src = s.qr_image_url; }
  if (s.qr_btn_text)     { const b = document.getElementById('qr-btn'); b.textContent = s.qr_btn_text; b.href = s.qr_btn_url||'#'; }
  if (s.watch_popup_footer){ document.getElementById('watch-modal-footer').textContent = s.watch_popup_footer; }

  // logo
  if (s.logo_url) {
    const wrap = document.getElementById('nav-desktop');
    const logoHtml = `<a class="logo-wrap" href="/"><img class="logo-img" src="${s.logo_url}" alt="${s.logo_alt||'Logo'}" onerror="this.replaceWith(document.createElement('span'))"></a>`;
    wrap.insertAdjacentHTML('beforebegin', logoHtml);
    document.getElementById('drawer-logo').src = s.logo_url;
  }
}

function renderTicker(rows) {
  if (!rows) return;
  const items = active(rows);
  const track = document.getElementById('ticker-track');
  const html = [...items, ...items].map(r =>
    `<div class="ticker-item"><span>●</span> ${r.emoji||''} ${r.text}</div>`
  ).join('');
  track.innerHTML = html;
}

function renderNav(rows) {
  if (!rows) return;
  const items = active(rows);
  const desktop = document.getElementById('nav-desktop');
  const drawerNav = document.getElementById('drawer-nav');
  let dHtml = '', mHtml = '';
  items.forEach(r => {
    const t = (r.type||'normal').toLowerCase();
    const cls = t==='live' ? 'nav-live-btn' : t==='watch' ? 'nav-watch-btn' : '';
    const mCls = t==='live' ? 'drawer-live' : t==='watch' ? 'drawer-watch' : '';
    const active = r.active_true_false === 'TRUE' ? ' class="active"' : '';
    dHtml += `<a href="${r.href||'#'}" class="${cls}"${active}>${r.label}</a>`;
    mHtml += `<a href="${r.href||'#'}" class="${mCls}" onclick="closeDrawer()">${r.label}</a>`;
  });
  desktop.innerHTML = dHtml;
  drawerNav.innerHTML = mHtml;
}

function renderSlides(rows) {
  if (!rows) return;
  const slides = active(rows);
  const container = document.getElementById('slides-container');
  let html = '';
  slides.forEach((s, i) => {
    const liveBadge = s.show_live_badge === 'TRUE' ? `<span class="slide-live-badge">🔴 LIVE</span>` : '';
    const btn2 = s.btn2_text ? `<a href="${s.btn2_url||'#'}" class="btn-slide-outline">${s.btn2_text}</a>` : '';
    html += `
    <div class="slide${i===0?' active':''}">
      <div class="slide-bg" style="background-image:url('${s.bg_image_url}')"></div>
      <div class="slide-overlay"></div>
      <div class="slide-content">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;">
          <span class="slide-sport-badge">${s.sport_badge||''}</span>
          ${liveBadge}
        </div>
        <div class="slide-title">${s.title||''}</div>
        <div class="slide-sub">${s.subtitle||''}</div>
        <div class="slide-btns">
          <a href="${s.btn1_url||'#'}" class="btn-slide-watch">${s.btn1_text||'Watch'}</a>
          ${btn2}
        </div>
      </div>
    </div>`;
  });
  // dots
  const dotsHtml = slides.map((_, i) =>
    `<div class="dot${i===0?' active':''}" onclick="goSlide(${i});startSlider()"></div>`
  ).join('');
  container.innerHTML = html + `<div class="slide-dots">${dotsHtml}</div>`;
  totalSlides = slides.length;
  startSlider();
}

function renderMatchCards(rows) {
  if (!rows) return;
  const cards = active(rows);
  const el = document.getElementById('match-overlay');

  // ── Group cards by btn_url ───────────────────────────────
  const groups = new Map();
  cards.forEach(c => {
    const key = (c.btn_url || '#').trim();
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(c);
  });

  // ── Clean platform label from URL ────────────────────────
  function platformLabel(url) {
    if (!url || url === '#') return 'Watch';
    try {
      const parsed = new URL(url);
      const host = parsed.hostname.replace(/^www\./, '');
      const known = {
        'youtube.com':'YouTube','youtu.be':'YouTube',
        'jiocinema.com':'JioCinema','jiocinemapro.com':'JioCinema',
        'hotstar.com':'Hotstar','disneyplus.com':'Disney+',
        'sonyliv.com':'SonyLIV','zee5.com':'ZEE5','voot.com':'Voot',
        'fancode.com':'FanCode','cricbuzz.com':'Cricbuzz',
        'espn.com':'ESPN','espnplus.com':'ESPN+',
        'starsports.com':'Star Sports','star.com':'Star Sports',
        'skysports.com':'Sky Sports','btsports.co.uk':'BT Sport',
        'dazn.com':'DAZN','willow.tv':'Willow TV',
        'facebook.com':'Facebook','fb.com':'Facebook',
        't.me':'Telegram','telegram.org':'Telegram',
      };
      if (known[host]) return known[host];
      // Use last non-empty path segment for unknown/personal domains
      const pathParts = parsed.pathname.split('/').filter(Boolean);
      const segment = pathParts[pathParts.length - 1] || host.split('.')[0];
      return segment.replace(/[-_]/g,' ').replace(/\b\w/g, l => l.toUpperCase());
    } catch(e) { return 'Watch'; }
  }

  let html = '';
  const timers = [];

  groups.forEach((groupCards, btnUrl) => {
    html += `<div class="smo-section">`;
    html += `<div class="smo-section-label">${platformLabel(btnUrl)}</div>`;

    groupCards.forEach(c => {
      const isLive = (c.status_live_upcoming||c.status||'').toLowerCase() === 'live';
      const badge = isLive
        ? `<div class="smo-live-badge"><div class="live-dot-r"></div>LIVE</div>`
        : `<div class="smo-upcoming-badge">⏰ UPCOMING</div>`;
      const dateLabel = c.date_label || '';
      const countdown = c.countdown_to_iso_datetime || c.countdown_to || '';
      const timerId = 'timer-' + Math.random().toString(36).slice(2);
      const timerBlock = (!isLive && countdown)
        ? `<div class="smo-timer"><div class="timer-label">STARTS IN</div><div class="timer-display" id="${timerId}">--:--:--</div></div>`
        : '';

      html += `
      <div class="smo-card">
        <div class="smo-header">${badge}<span class="smo-date">${dateLabel}</span></div>
        <div class="smo-teams">
          <div class="smo-team">
            ${img(c.team1_logo_url,'',`smo-logo`)}
            <div><div class="smo-name">${c.team1_code||''}</div><div class="smo-full">${c.team1_full_name||''}</div></div>
          </div>
          <div class="smo-vs">VS</div>
          <div class="smo-team" style="flex-direction:row-reverse">
            ${img(c.team2_logo_url,'',`smo-logo`)}
            <div style="text-align:right"><div class="smo-name">${c.team2_code||''}</div><div class="smo-full">${c.team2_full_name||''}</div></div>
          </div>
        </div>
        ${timerBlock}
        <a class="smo-btn" href="${c.btn_url||'#'}" target="_blank" rel="noopener">${c.btn_text||'Watch Live'}</a>
      </div>`;

      if (!isLive && countdown) timers.push({ id: timerId, target: countdown });
    });

    html += `</div>`; // close smo-section
  });

  el.innerHTML = html;

  timers.forEach(({ id, target }) => {
    setTimeout(() => {
      const el2 = document.getElementById(id);
      if (el2) startCountdown(el2, target);
    }, 100);
  });
}

function renderChannels(rows) {
  if (!rows) return;
  const channels = active(rows);
  const grid = document.getElementById('channels-grid');
  grid.innerHTML = channels.map(c => {
    const isLive = (c.status_live_off||c.status||'').toUpperCase() === 'LIVE';
    const is4k = (c.quality||'').toUpperCase() === '4K';
    const qBadge = c.quality ? `<span class="quality-badge${is4k?' quality-badge-4k':''}">${c.quality}</span>` : '';
    return `
    <a class="channel-card" href="${c.watch_url||'#'}">
      <div class="channel-icon-wrap">
        ${img(c.icon_url,'','')}
        <div class="play-overlay"><div class="play-tri"></div></div>
      </div>
      <div class="channel-name">${c.channel_name}</div>
      ${isLive ? `<div class="channel-status"><div class="live-dot-r"></div>LIVE</div>` : '<div class="channel-status" style="color:var(--gray-400)">OFF AIR</div>'}
      <div class="channel-prog">${c.program_text||''}</div>
      ${qBadge}
    </a>`;
  }).join('');
}

function renderFixtures(rows) {
  if (!rows) return;
  const fx = active(rows);
  const grid = document.getElementById('fixtures-grid');
  grid.innerHTML = fx.map(f => {
    const isLive = (f.status||'').toLowerCase() === 'live';
    const shimmer = isLive ? '<div class="live-shimmer"></div>' : '';
    const badgeCls = isLive ? 'fixture-badge fixture-badge-live' : 'fixture-badge';
    const badgeTxt = isLive ? '🔴 LIVE' : '⏰ UPCOMING';
    return `
    <div class="fixture-card">
      ${shimmer}
      <div class="fixture-top">
        <div><div class="fixture-date">${f.date_label||''}</div><div class="fixture-venue-sm">${f.venue||''}</div></div>
        <span class="${badgeCls}">${badgeTxt}</span>
      </div>
      <div class="fixture-body">
        <div class="fixture-teams">
          <div class="fixture-team">
            <div class="team-logo-wrap">${img(f.team1_logo_url,f.team1_name,'')}</div>
            <div class="fixture-team-name">${f.team1_name||''}</div>
          </div>
          <div class="fixture-vs">VS</div>
          <div class="fixture-team">
            <div class="team-logo-wrap">${img(f.team2_logo_url,f.team2_name,'')}</div>
            <div class="fixture-team-name">${f.team2_name||''}</div>
          </div>
        </div>
      </div>
      <div class="fixture-footer">
        <span class="fixture-venue-label">${f.venue||''}</span>
        <a class="btn-watch-sm" href="${f.watch_url||'#'}">▶ WATCH</a>
      </div>
    </div>`;
  }).join('');
}

function renderCategories(rows) {
  if (!rows) return;
  const cats = active(rows);
  const grid = document.getElementById('categories-grid');
  grid.innerHTML = cats.map(c => {
    const preset = (c.gradient_preset||'').toLowerCase();
    const clsMap = {cricket:'cat-cricket',football:'cat-football',tennis:'cat-tennis',f1:'cat-f1'};
    const cls = clsMap[preset] || 'cat-cricket';
    return `
    <a class="cat-card ${cls}" href="${c.link||'#'}">
      <div class="cat-emoji">${c.emoji||''}</div>
      <div class="cat-name">${c.name}</div>
      <div class="cat-count">${c.match_count_text||''}</div>
    </a>`;
  }).join('');
}

function renderBroadcast(rows) {
  if (!rows) return;
  const items = active(rows);
  const grid = document.getElementById('broadcast-grid');
  const featured = items.filter(r => (r.type_featured_partner||r.type||'').toLowerCase() === 'featured');
  const partners = items.filter(r => (r.type_featured_partner||r.type||'').toLowerCase() !== 'featured');

  let html = '';
  if (featured.length) {
    const f = featured[0];
    html += `
    <div class="broadcast-card bc-featured">
      <div class="broadcast-logo-wrap"><img src="${f.logo_url||''}" alt="${f.name}" onerror="this.style.display='none'"></div>
      <div class="broadcast-name">${f.name}</div>
      <span class="broadcast-quality">${f.quality_label||''}</span>
      <p class="broadcast-desc">${f.description||''}</p>
      <a class="bc-watch-btn" href="${f.watch_url||'#'}" target="_blank">▶ Watch Free</a>
    </div>`;
  }

  if (partners.length) {
    const pHtml = partners.map(p => `
      <div class="partner-logo-item">
        <div class="partner-logo-box"><img src="${p.logo_url||''}" alt="${p.name}" onerror="this.style.display='none'"></div>
        <div class="partner-logo-label">${p.name}</div>
      </div>`).join('');
    html += `
    <div class="broadcast-card">
      <div class="broadcast-name" style="align-self:flex-start;margin-bottom:4px">Also Available On</div>
      <div class="partner-logos-row">${pHtml}</div>
      <p class="broadcast-desc">Available via subscription or pay-per-view on official platforms.</p>
    </div>`;
  }

  grid.innerHTML = html;
}

function renderSchedule(rows) {
  if (!rows) return;
  const items = active(rows);
  const tabs = [...new Set(items.map(r => r.tab_group))].filter(Boolean);
  if (!tabs.length) return;

  const tabsEl = document.getElementById('schedule-tabs');
  const rowsEl = document.getElementById('schedule-rows');
  let activeTabs = {};

  function drawRows(tab) {
    const filtered = items.filter(r => r.tab_group === tab);
    rowsEl.innerHTML = filtered.map(r => {
      const isLive = (r.status_live_upcoming_finished||r.status||'').toLowerCase() === 'live';
      const liveTag = isLive ? `<div class="match-live-tag">🔴 LIVE</div>` : '';
      const color = r.sport_color || '#1d4ed8';
      return `
      <div class="match-row">
        <div class="match-time">
          <div>${r.match_time||''}</div>
          <span class="match-sport-badge" style="background:${color}22;color:${color}">${r.sport_badge||''}</span>
        </div>
        <div class="team-home">
          ${img(r.home_logo_url,'',`team-logo-s`)}
          <div class="team-name">${r.team_home||''}</div>
        </div>
        <div class="vs-box">VS</div>
        <div class="team-away">
          ${img(r.away_logo_url,'',`team-logo-s`)}
          <div class="team-name">${r.team_away||''}</div>
        </div>
        <div class="match-channel">${liveTag}<div>${r.channel||''}</div></div>
      </div>`;
    }).join('');
  }

  tabsEl.innerHTML = tabs.map((t, i) =>
    `<button class="tab${i===0?' active':''}" onclick="selectTab('${t}',this)">${t}</button>`
  ).join('');

  window.selectTab = (tab, btn) => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    drawRows(tab);
  };
  drawRows(tabs[0]);
}

function renderSocial(rows) {
  if (!rows) return;
  const items = active(rows);
  const el = document.getElementById('social-links');
  el.innerHTML = items.map(s =>
    `<a class="social-link" href="${s.url||'#'}" target="_blank" rel="noopener">${s.icon_emoji||''} ${s.label}</a>`
  ).join('');
}

function renderFooter(rows) {
  if (!rows) return;
  const items = active(rows);
  const cols = {};
  items.forEach(r => {
    if (!cols[r.column_title]) cols[r.column_title] = [];
    cols[r.column_title].push(r);
  });
  const footerTop = document.getElementById('footer-top');
  Object.entries(cols).forEach(([title, links]) => {
    const div = document.createElement('div');
    div.className = 'footer-col';
    div.innerHTML = `<h4>${title}</h4><ul>${links.map(l =>
      `<li><a href="${l.link_href||'#'}">${l.link_text}</a></li>`
    ).join('')}</ul>`;
    footerTop.appendChild(div);
  });
}

function renderWatchPopup(rows) {
  if (!rows) return;
  const items = active(rows);
  const body = document.getElementById('watch-modal-body');

  const featured = items.filter(r => (r.is_featured_true_false||r.is_featured||'').toUpperCase()==='TRUE');
  const rest = items.filter(r => (r.is_featured_true_false||r.is_featured||'').toUpperCase()!=='TRUE');

  const badgeHtml = b => {
    const bm = {free:'badge-free FREE',nologin:'badge-nologin NO LOGIN',['4k']:'badge-4k 4K',unavail:'badge-unavail UNAVAIL'};
    if (!b || !bm[b.toLowerCase()]) return '';
    const [cls, txt] = bm[b.toLowerCase()].split(' ');
    return `<span class="${cls}">${txt}</span>`;
  };

  let html = '';
  featured.forEach(f => {
    html += `
    <a class="watch-sx-featured" href="${f.watch_url||'#'}" target="_blank" rel="noopener">
      <div class="watch-ch-logo">${img(f.logo_url,'',)}</div>
      <div class="watch-ch-info">
        <div class="watch-ch-name" style="font-size:16px;font-weight:900">${f.channel_name}</div>
        <div style="display:flex;gap:6px;margin-top:4px">${badgeHtml(f.badge)}</div>
      </div>
      <span class="watch-ch-arrow">›</span>
    </a>`;
  });

  const groups = [...new Set(rest.map(r => r.language_group))].filter(Boolean);
  groups.forEach(g => {
    const groupItems = rest.filter(r => r.language_group === g);
    html += `<div class="watch-lang-section"><div class="watch-lang-label">${g}</div><div class="watch-channels">`;
    groupItems.forEach(ch => {
      const isUnavail = (ch.badge||'').toLowerCase() === 'unavail';
      html += `
      <a class="watch-channel-btn${isUnavail?' unavail-card':''}" href="${ch.watch_url||'#'}" target="_blank" rel="noopener">
        <div class="watch-ch-logo">${img(ch.logo_url,'')}</div>
        <div class="watch-ch-info">
          <div class="watch-ch-name">${ch.channel_name}</div>
          <div style="margin-top:2px">${badgeHtml(ch.badge)}</div>
        </div>
        <span class="watch-ch-arrow">›</span>
      </a>`;
    });
    html += `</div></div>`;
  });

  body.innerHTML = html;
}

// ── MAIN INIT ────────────────────────────────────────────────
async function init() {
  const steps = [
    ['SETTINGS',     renderSettings,   15, 'Loading settings…'],
    ['TICKER',       renderTicker,     22, 'Loading ticker…'],
    ['NAVBAR',       renderNav,        30, 'Building nav…'],
    ['HERO SLIDES',  renderSlides,     38, 'Loading slides…'],
    ['MATCH CARDS',  renderMatchCards, 46, 'Loading match cards…'],
    ['LIVE CHANNELS',renderChannels,   54, 'Loading channels…'],
    ['FIXTURES',     renderFixtures,   62, 'Loading fixtures…'],
    ['CATEGORIES',   renderCategories, 68, 'Loading categories…'],
    ['BROADCAST',    renderBroadcast,  74, 'Loading broadcast…'],
    ['SCHEDULE',     renderSchedule,   80, 'Loading schedule…'],
    ['SOCIAL LINKS', renderSocial,     86, 'Loading social…'],
    ['FOOTER',       renderFooter,     92, 'Loading footer…'],
    ['WATCH POPUP',  renderWatchPopup, 98, 'Loading popup…'],
  ];

  for (const [sheet, render, pct, label] of steps) {
    setProgress(pct, label);
    const data = await fetchSheet(sheet);
    render(data);
    await new Promise(r => setTimeout(r, 50)); // brief yield for paint
  }

  setProgress(100, 'READY');
}

// ── UI HELPERS ───────────────────────────────────────────────
function toggleDrawer() {
  document.getElementById('sideDrawer').classList.toggle('open');
  document.getElementById('drawerOverlay').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('open');
  // close QR if open
  document.getElementById('qr-panel').classList.remove('open');
  document.getElementById('nav-qr-btn').classList.remove('active');
}
function closeDrawer() {
  document.getElementById('sideDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
}
function openWatch() { document.getElementById('watchOverlay').classList.add('open'); }
function closeWatch() { document.getElementById('watchOverlay').classList.remove('open'); }
function toggleQr() {
  document.getElementById('qr-panel').classList.toggle('open');
  document.getElementById('nav-qr-btn').classList.toggle('active');
}

document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    const loader = document.getElementById('cms-loader');
    loader.classList.add('done');
    setTimeout(() => loader.style.display = 'none', 500);
  }, 3000);
  init();

  // Close QR panel on outside click
  document.addEventListener('click', (e) => {
    const wrap = document.getElementById('nav-qr-wrap');
    if (wrap && !wrap.contains(e.target)) {
      document.getElementById('qr-panel').classList.remove('open');
      document.getElementById('nav-qr-btn').classList.remove('active');
    }
  });
});
</script>
