<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SaptarshiX DASH Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.min.js"></script>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
#video{width:100%;height:100vh;background:#000}
#status{position:fixed;top:10px;left:10px;background:rgba(0,0,0,.7);padding:8px 12px;border-radius:8px}
</style>
</head>
<body>
<div id="status">Loading...</div>
<video id="video" controls autoplay></video>
<script>
async function init(){
 const player=new shaka.Player(document.getElementById('video'));
 const realMPD="PASTE_YOUR_MPD_URL_HERE";
 const proxy="https://YOUR-PROXY-DOMAIN/proxy?url="+encodeURIComponent(realMPD);
 try{await player.load(proxy);document.getElementById('status').innerText='Playing';}
 catch(e){document.getElementById('status').innerText='Failed';console.error(e);}
}
init();
</script>
</body></html>
