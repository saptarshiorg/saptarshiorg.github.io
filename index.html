<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL Loading...</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #000;
}

/* FAST BACKGROUND LOAD */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://i.postimg.cc/13PyZPJh/Chat-GPT-Image-Apr-30-2026-10-59-52-PM.png') center/cover no-repeat;
    filter: blur(20px) brightness(0.6);
    transform: scale(1.05);
}

/* MAIN IMAGE (LOADS INSTANTLY) */
.main-img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 1; /* no delay */
}

/* GLASS TIMER */
.timer-box {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    padding: 16px 40px;
    border-radius: 25px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    text-align: center;
}

#count {
    font-size: 30px;
    font-weight: bold;
}

.small {
    font-size: 14px;
    opacity: 0.85;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- PRELOAD IMAGE FOR FAST RENDER -->
<link rel="preload" as="image" href="https://i.postimg.cc/13PyZPJh/Chat-GPT-Image-Apr-30-2026-10-59-52-PM.png">

<img class="main-img"
src="https://i.postimg.cc/13PyZPJh/Chat-GPT-Image-Apr-30-2026-10-59-52-PM.png"
alt="IPL Banner">

<div class="timer-box">
    <div id="count">3</div>
    <div class="small">IPL Playing...</div>
</div>

<script>
let timeLeft = 3;
const countEl = document.getElementById("count");

const timer = setInterval(() => {
    timeLeft--;
    countEl.textContent = timeLeft;

    if (timeLeft <= 0) {
        clearInterval(timer);
        window.location.href = "https://saptarshiorg.github.io/ipl";
    }
}, 1000);
</script>

</body>
</html>
