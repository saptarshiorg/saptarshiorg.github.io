<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Starting Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: #070b14;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      color: white;
    }

    /* Animated Gradient Background */
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,255,255,0.25), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,0,170,0.25), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(0,140,255,0.25), transparent 35%),
        linear-gradient(135deg, #050816, #0b1024, #0a132f);
      animation: moveBg 12s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes moveBg {
      0% {
        transform: scale(1) rotate(0deg);
      }
      100% {
        transform: scale(1.1) rotate(2deg);
      }
    }

    /* Glass Card */
    .glass {
      position: relative;
      width: min(90vw, 1200px);
      aspect-ratio: 16 / 9;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.45),
        inset 0 1px 1px rgba(255,255,255,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      z-index: 2;
    }

    .glass::before {
      content: "";
      position: absolute;
      width: 180%;
      height: 180%;
      background: linear-gradient(
        135deg,
        transparent,
        rgba(255,255,255,0.12),
        transparent
      );
      transform: rotate(25deg);
      animation: shine 6s linear infinite;
    }

    @keyframes shine {
      0% {
        left: -150%;
        top: -150%;
      }
      100% {
        left: 100%;
        top: 100%;
      }
    }

    .logo {
      font-size: clamp(18px, 2vw, 28px);
      letter-spacing: 6px;
      font-weight: 600;
      opacity: 0.8;
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    .title {
      font-size: clamp(40px, 6vw, 92px);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 18px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ffffff, #6ee7ff, #ffffff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: textGlow 5s linear infinite;
      z-index: 3;
    }

    @keyframes textGlow {
      to {
        background-position: 200% center;
      }
    }

    .subtitle {
      font-size: clamp(14px, 1.4vw, 24px);
      font-weight: 300;
      opacity: 0.9;
      max-width: 80%;
      line-height: 1.7;
      margin-bottom: 35px;
      z-index: 3;
    }

    .countdown {
      display: flex;
      gap: clamp(10px, 2vw, 28px);
      z-index: 3;
      flex-wrap: wrap;
      justify-content: center;
    }

    .time-box {
      min-width: clamp(80px, 10vw, 140px);
      padding: clamp(14px, 2vw, 28px);
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    }

    .time {
      font-size: clamp(28px, 4vw, 64px);
      font-weight: 700;
    }

    .label {
      font-size: clamp(11px, 1vw, 16px);
      text-transform: uppercase;
      letter-spacing: 3px;
      opacity: 0.7;
      margin-top: 4px;
    }

    .pulse {
      position: absolute;
      width: 350px;
      height: 350px;
      background: rgba(0,255,255,0.08);
      border-radius: 50%;
      filter: blur(40px);
      animation: pulse 4s ease-in-out infinite;
    }

    .pulse.one {
      top: -80px;
      left: -80px;
    }

    .pulse.two {
      bottom: -120px;
      right: -120px;
      animation-delay: 2s;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

    .live-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00ff99;
      box-shadow: 0 0 12px #00ff99;
      animation: blink 1s infinite;
      display: inline-block;
      margin-right: 10px;
    }

    @keyframes blink {
      50% {
        opacity: 0.3;
      }
    }

    .footer {
      position: absolute;
      bottom: 24px;
      font-size: clamp(12px, 1vw, 16px);
      opacity: 0.65;
      letter-spacing: 2px;
      z-index: 3;
    }

    .back-btn {
      margin-top: 28px;
      padding: 14px 34px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
      text-decoration: none;
      font-size: clamp(13px, 1vw, 18px);
      font-weight: 600;
      letter-spacing: 1px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.3s ease;
      z-index: 3;
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    }

    .back-btn:hover {
      transform: translateY(-3px) scale(1.03);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }

    @media (max-width: 768px) {
      .glass {
        width: 96vw;
        border-radius: 24px;
      }

      .subtitle {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="pulse one"></div>
  <div class="pulse two"></div>

  <div class="glass">

    <div class="logo">
      <span class="live-dot"></span>
      LIVE STREAM
    </div>

    <div class="title">
      Starting Soon
    </div>

    <div class="subtitle">
      The stream will begin shortly. Stay tuned and enjoy the experience.
    </div>

    <div class="subtitle" style="margin-top: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;">
      We Will Be Back At Match Time
    </div>

    <a href="https://saptarshiorg.github.io" class="back-btn">
      ← Back To Home
    </a>

    <div class="footer">
      STREAM STARTING SOON • PLEASE WAIT
    </div>

  </div>

  <script>
    // Countdown Time in Seconds
    let totalSeconds = 5 * 60;

    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');

    function updateCountdown() {
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      hoursEl.textContent = String(hours).padStart(2, '0');
      minutesEl.textContent = String(minutes).padStart(2, '0');
      secondsEl.textContent = String(seconds).padStart(2, '0');

      if (totalSeconds > 0) {
        totalSeconds--;
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
