<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Player</title>
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}
iframe {
    width: 100vw;
    height: 100vh;
    border: none;
}

/* Brave popup */
#brave-popup {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 9999;
    max-width: 280px;
    background: rgba(20, 20, 20, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    padding: 12px 14px;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    animation: brave-slide-in 0.4s ease-out;
    transition: opacity 0.3s ease, transform 0.3s ease;
}

@keyframes brave-slide-in {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
}

#brave-popup.hide {
    opacity: 0;
    transform: translateY(-12px);
    pointer-events: none;
}

#brave-popup .brave-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
}

#brave-popup .brave-icon {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    margin-top: 1px;
}

#brave-popup .brave-text {
    flex: 1;
    font-size: 12.5px;
    line-height: 1.4;
}

#brave-popup .brave-text strong {
    display: block;
    font-size: 13.5px;
    margin-bottom: 2px;
}

#brave-popup a.brave-link {
    display: inline-block;
    margin-top: 8px;
    background: #fb542b;
    color: #fff;
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 7px;
}

#brave-popup .brave-close {
    position: absolute;
    top: 6px;
    right: 8px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 4px;
}
#brave-popup .brave-close:hover {
    color: #fff;
}
</style>
</head>
<body>
<iframe
    src="https://hamis.romponalis.st/premiumtv/daddy5.php?id=369"
    referrerpolicy="origin"
    allow="fullscreen; autoplay; encrypted-media; picture-in-picture"
    allowfullscreen>
</iframe>

<div id="brave-popup">
    <button class="brave-close" onclick="document.getElementById('brave-popup').classList.add('hide')">&times;</button>
    <div class="brave-row">
        <img class="brave-icon" src="https://brave.com/static-assets/images/brave-logo-sans-text.svg" alt="Brave">
        <div class="brave-text">
            <strong>Use Brave Browser</strong>
            For a smoother, ad-free stream — no popups or smartlink redirects.
            <a class="brave-link" href="https://brave.com/download/" target="_blank" rel="noopener noreferrer">Get Brave</a>
        </div>
    </div>
</div>

<script>
(async function () {
    var el = document.getElementById('brave-popup');
    if (!el) return;

    // If the visitor is already on Brave, don't show the nag popup at all.
    var isBrave = false;
    try {
        if (navigator.brave && typeof navigator.brave.isBrave === 'function') {
            isBrave = await navigator.brave.isBrave();
        }
    } catch (e) {
        isBrave = false;
    }

    if (isBrave) {
        el.style.display = 'none';
        return;
    }

    // Otherwise, auto-dismiss after 12s as before.
    setTimeout(function () {
        el.classList.add('hide');
    }, 12000);
})();
</script>

</body>
</html>
