<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Player</title>
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}
iframe {
    width: 100vw;
    height: 100vh;
    border: none;
}
</style>
</head>
<body>

<iframe
    src="https://ritzembeds.pages.dev/embed/fox4k-usa"
    referrerpolicy="origin"
    allow="fullscreen; autoplay; encrypted-media; picture-in-picture"
    allowfullscreen>
</iframe>

</body>
</html>
