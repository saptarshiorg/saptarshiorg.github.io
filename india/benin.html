<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>beIN SPORTS – FIFA World Cup 2026 Live</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,'Google Sans','Helvetica Neue',sans-serif;overflow:hidden;background:#050300;}
body{display:flex;flex-direction:column;position:relative;}

/* ── AMBIENT GLOW BACKGROUND ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% -10%, rgba(212,160,23,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 10% 110%, rgba(180,130,10,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 110%, rgba(180,130,10,0.10) 0%, transparent 60%),
    #060400;
  pointer-events:none;
}

/* ── FIFA EMBLEM WATERMARK ── */
body::after{
  content:'';position:fixed;
  right:-40px;bottom:-40px;
  width:340px;height:340px;z-index:0;
  background:url('https://upload.wikimedia.org/wikipedia/en/1/17/2026_FIFA_World_Cup_emblem.svg') center/contain no-repeat;
  opacity:0.055;
  pointer-events:none;
  filter:saturate(0) brightness(3);
}

/* ── HEADER ── */
header{
  display:flex;align-items:center;
  padding:0 12px;height:48px;flex-shrink:0;
  position:relative;z-index:10;
  background:rgba(10,8,2,0.72);
  backdrop-filter:blur(18px) saturate(1.4);
  -webkit-backdrop-filter:blur(18px) saturate(1.4);
  border-bottom:1px solid rgba(212,160,23,0.22);
  gap:0;overflow:hidden;
}

/* golden shimmer line */
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,#d4a017 30%,#f5d76e 55%,#d4a017 70%,transparent 100%);
  opacity:.55;
}

/* subtle top accent */
header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(212,160,23,0.3) 50%,transparent 100%);
}

/* LEFT: back + brand */
.brand{
  display:flex;align-items:center;gap:6px;
  flex-shrink:0;text-decoration:none;margin-right:10px;
  cursor:pointer;
}
.brand-icon{
  width:28px;height:28px;border-radius:6px;overflow:hidden;
  border:1px solid rgba(212,160,23,0.35);
  background:rgba(212,160,23,0.08);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  box-shadow:0 0 10px rgba(212,160,23,0.2),inset 0 1px 0 rgba(255,255,255,0.08);
}
.brand-icon img{width:18px;height:18px;object-fit:contain;}
.brand-text{
  font-size:.68rem;font-weight:900;letter-spacing:1.2px;
  background:linear-gradient(135deg,#f5d76e 0%,#d4a017 50%,#f5d76e 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;
  filter:drop-shadow(0 0 6px rgba(212,160,23,0.5));
}

/* DIVIDER */
.div{
  width:1px;height:24px;flex-shrink:0;margin-right:10px;
  background:linear-gradient(180deg,transparent,rgba(212,160,23,0.35),transparent);
}

/* FIFA emblem mini badge */
.fifa-badge{
  width:32px;height:32px;flex-shrink:0;margin-right:8px;
  background:url('https://upload.wikimedia.org/wikipedia/en/1/17/2026_FIFA_World_Cup_emblem.svg') center/contain no-repeat;
  filter:drop-shadow(0 0 5px rgba(212,160,23,0.55));
  opacity:0.9;
}

/* CHANNEL LOGO */
.ch-logo{
  height:24px;max-width:48px;object-fit:contain;
  border-radius:4px;flex-shrink:0;margin-right:8px;
  filter:drop-shadow(0 0 4px rgba(212,160,23,0.3));
}

/* CHANNEL NAME */
.ch-name{
  font-size:.78rem;font-weight:700;
  color:#f0e0a0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;min-width:0;
  letter-spacing:.04em;
  text-shadow:0 0 12px rgba(212,160,23,0.4);
}

/* LIVE PILL */
.live-pill{
  display:flex;align-items:center;gap:4px;
  background:rgba(239,68,68,0.12);
  border:1px solid rgba(239,68,68,0.35);
  border-radius:100px;padding:3px 8px;
  flex-shrink:0;margin-left:8px;
  box-shadow:0 0 8px rgba(239,68,68,0.15);
  backdrop-filter:blur(6px);
}
.live-dot{width:5px;height:5px;background:#ef4444;border-radius:50%;animation:blink 1.4s infinite;box-shadow:0 0 5px #ef4444;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.live-txt{font-size:.58rem;font-weight:800;color:#ef4444;letter-spacing:.1em;}

/* ── GLASS PLAYER CONTAINER ── */
.player-outer{
  flex:1;position:relative;z-index:1;
  display:flex;flex-direction:column;
  padding:10px;gap:0;
  overflow:hidden;
}

.player-glass{
  flex:1;position:relative;
  border-radius:14px;overflow:hidden;
  border:1px solid rgba(212,160,23,0.28);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.6),
    0 0 40px rgba(212,160,23,0.12),
    0 0 80px rgba(212,160,23,0.06),
    inset 0 1px 0 rgba(212,160,23,0.15),
    inset 0 -1px 0 rgba(0,0,0,0.4);
  background:rgba(10,8,2,0.5);
  backdrop-filter:blur(4px);
}

/* corner accents */
.player-glass::before,
.player-glass::after{
  content:'';position:absolute;z-index:5;pointer-events:none;
  width:18px;height:18px;
  border-color:rgba(212,160,23,0.55);
  border-style:solid;
}
.player-glass::before{
  top:8px;left:8px;
  border-width:2px 0 0 2px;
  border-radius:4px 0 0 0;
  box-shadow:-1px -1px 8px rgba(212,160,23,0.3);
}
.player-glass::after{
  bottom:8px;right:8px;
  border-width:0 2px 2px 0;
  border-radius:0 0 4px 0;
  box-shadow:1px 1px 8px rgba(212,160,23,0.3);
}

.player-glass iframe{
  position:absolute;inset:0;width:100%;height:100%;border:none;display:block;
}

/* ── BOTTOM BAR ── */
.bottom-bar{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  gap:6px;
  padding:6px 12px 8px;
  position:relative;z-index:5;
}
.wc-label{
  font-size:.58rem;font-weight:700;letter-spacing:.12em;
  color:rgba(212,160,23,0.5);
  text-transform:uppercase;
}
.wc-dot{width:3px;height:3px;background:rgba(212,160,23,0.3);border-radius:50%;}
</style>
</head>
<body>

<header>
  <a class="brand" href="javascript:history.back()">
    <div class="brand-icon">
      <img src="https://raw.githubusercontent.com/saptarshiorg/saptarshiorg.github.io/main/logo.png" alt="SX" onerror="this.style.display='none'">
    </div>
    <span class="brand-text">SX</span>
  </a>
  <div class="div"></div>
  <div class="fifa-badge"></div>
  <img class="ch-logo" src="https://www.sportspro.com/wp-content/uploads/2023/03/bein-edit-2.png" alt="beIN SPORTS" onerror="this.style.display='none'">
  <span class="ch-name">beIN SPORTS</span>
  <div class="live-pill">
    <div class="live-dot"></div>
    <span class="live-txt">LIVE</span>
  </div>
</header>

<div class="player-outer">
  <div class="player-glass">
    <iframe
      src="https://fifa-world-cup-live.pages.dev/benin.html"
      allowfullscreen
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture; clipboard-write; web-share; accelerometer; gyroscope; payment"
      referrerpolicy="no-referrer-when-downgrade"
      scrolling="no">
    </iframe>
  </div>
</div>

<div class="bottom-bar">
  <span class="wc-label">FIFA World Cup 2026</span>
  <div class="wc-dot"></div>
  <span class="wc-label">SX Sports Live</span>
</div>

</body>
</html>
