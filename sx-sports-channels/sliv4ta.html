<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sony Sports Ten 4 Tamil – SX Sports Live</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#020c06;font-family:-apple-system,'Google Sans','Helvetica Neue',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}
header{
  display:flex;align-items:center;gap:10px;
  padding:0 14px;height:48px;flex-shrink:0;
  background:rgba(6,20,16,0.92);
  border-bottom:1px solid rgba(34,197,94,0.18);
  backdrop-filter:blur(20px);
  position:relative;z-index:10;
}
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,#22c55e 40%,#84cc16 60%,transparent 100%);
  opacity:.35;
}
.logo-wrap{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-wrap img{height:28px;object-fit:contain;}
.logo-text{
  font-size:1rem;font-weight:700;
  background:linear-gradient(120deg,#22c55e 0%,#84cc16 50%,#10b981 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:.5px;
}
.ch-info{display:flex;align-items:center;gap:10px;margin-left:auto;}
.ch-logo{height:28px;object-fit:contain;border-radius:4px;}
.ch-name{
  font-size:.82rem;font-weight:600;color:#e4f0ea;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:220px;
}
.live-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);
  border-radius:100px;padding:3px 9px;flex-shrink:0;
}
.live-dot{width:6px;height:6px;background:#ef4444;border-radius:50%;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-size:.65rem;font-weight:700;color:#ef4444;letter-spacing:.06em;}
.player-wrap{flex:1;position:relative;background:#000;overflow:hidden;}
.player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.blocked{
  position:absolute;inset:0;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:radial-gradient(ellipse at center,#0a1e15 0%,#020c06 100%);
}
.blocked svg{opacity:.25;}
.blocked p{color:#8db89e;font-size:.88rem;text-align:center;line-height:1.6;}
.open-btn{
  margin-top:4px;padding:10px 24px;border-radius:100px;
  background:#16a34a;color:#fff;font-size:.83rem;font-weight:600;
  text-decoration:none;border:none;cursor:pointer;
  box-shadow:0 2px 14px rgba(34,197,94,0.35);
  transition:background .18s;
}
.open-btn:hover{background:#22c55e;}
</style>
</head>
<body>
<header>
  <a class="logo-wrap" href="javascript:history.back()">
    <img src="https://raw.githubusercontent.com/saptarshiorg/saptarshiorg.github.io/main/logo.png" alt="SX Sports" onerror="this.style.display='none'">
    <span class="logo-text">SX SPORTS</span>
  </a>
  <div class="ch-info">
    <img class="ch-logo" src="https://upload.wikimedia.org/wikipedia/en/thumb/c/cd/Sony_Sports_Network.svg/1280px-Sony_Sports_Network.svg.png" alt="Sony Sports Ten 4 Tamil" onerror="this.style.display='none'">
    <span class="ch-name">Sony Sports Ten 4 Tamil</span>
    <div class="live-pill">
      <div class="live-dot"></div>
      <span class="live-txt">LIVE</span>
    </div>
  </div>
</header>
<div class="player-wrap">
  <iframe id="frm"
    src="https://sayanchannelcdn02.pages.dev/star.html?id=sliv4ta"
    allowfullscreen
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture; clipboard-write; web-share; accelerometer; gyroscope; payment"
    referrerpolicy="no-referrer-when-downgrade"
    scrolling="no">
  </iframe>
  <div class="blocked" id="blocked">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12" stroke-width="2" stroke="white"/><circle cx="12" cy="16" r="1" fill="white"/></svg>
    <p>Stream blocked by browser.<br>Tap below to open directly.</p>
    <a class="open-btn" href="https://sayanchannelcdn02.pages.dev/star.html?id=sliv4ta" target="_blank" rel="noopener">&#9654; Open Stream</a>
  </div>
</div>
<script>
var frm=document.getElementById('frm');
var blocked=document.getElementById('blocked');
frm.onerror=function(){blocked.style.display='flex';frm.style.display='none';};
frm.onload=function(){
  try{
    var d=frm.contentDocument;
    if(d&&d.body&&d.body.innerHTML===''){blocked.style.display='flex';frm.style.display='none';}
  }catch(e){}
};
</script>
</body>
</html>
